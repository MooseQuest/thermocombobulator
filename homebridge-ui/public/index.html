<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { --accent: #2d7ff9; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px; line-height: 1.4; }
    h2 { margin: 0 0 4px; } .sub { color: #888; margin: 0 0 18px; }
    .room { border: 1px solid #4443; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .room-name { font-size: 1.15em; font-weight: 600; border: none; background: transparent; color: inherit; width: 70%; }
    .room-name:focus { outline: none; border-bottom: 2px solid var(--accent); }
    .things { margin: 10px 0; }
    .thing { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #8881; border-radius: 8px; margin: 4px 0; }
    .thing .x { margin-left: auto; cursor: pointer; color: #e55; border: none; background: none; font-size: 1.1em; }
    .big { display: block; width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; border: 1px solid #4446; background: transparent; color: inherit; font-size: 1em; text-align: left; cursor: pointer; }
    .big:hover { border-color: var(--accent); }
    .primary { background: var(--accent); color: #fff; border: none; text-align: center; font-weight: 600; }
    .ghost { background: transparent; border: 1px dashed #888; text-align: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    input.field { width: 100%; box-sizing: border-box; padding: 11px; border-radius: 9px; border: 1px solid #4446; background: transparent; color: inherit; margin: 5px 0; font-size: 1em; }
    .step { border: 1px solid var(--accent); border-radius: 12px; padding: 14px; margin-top: 10px; background: #2d7ff90d; }
    .step h4 { margin: 0 0 8px; } .muted { color: #888; font-size: 0.88em; }
    .checks label { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; }
    .checks label:hover { background: #8881; }
    .pick label { display: block; padding: 10px; border-radius: 8px; border: 1px solid #4443; margin: 5px 0; cursor: pointer; }
    .pick label:hover { border-color: var(--accent); }
    .footer { display: flex; gap: 10px; margin-top: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>Thermostats</h2>
  <p class="sub">Create a thermostat for an area, then add the devices it controls (heat, A/C, fans). Each becomes one thermostat you can place in any HomeKit room. Sign-ins stay on your Homebridge — nowhere else.</p>

  <div id="rooms"></div>
  <button class="big ghost" id="addRoom">＋ Add a thermostat</button>

  <div class="footer">
    <button class="big primary" id="save" style="flex:1">Save &amp; finish</button>
  </div>

  <script>
    // Friendly services. Each maps to a discovery endpoint + the sign-in fields it needs.
    const SERVICES = {
      mysa:        { emoji: '🔥', label: 'Mysa thermostat', discover: '/mysa/discover',
                     fields: [['email', 'Mysa email', 'email'], ['password', 'Mysa password', 'password']] },
      midea:       { emoji: '❄️', label: 'Midea A/C', discover: '/midea/existing', direct: true,
                     note: 'Reuses the A/Cs you already set up in the Midea plugin — no sign-in needed.' },
      nest:        { emoji: '🌡️', label: 'Nest thermostat', discover: '/nest/discover',
                     note: 'Needs a Google Device Access project.',
                     fields: [['nestProjectId', 'Project ID', 'text'], ['nestClientId', 'Client ID', 'text'], ['nestClientSecret', 'Client secret', 'password'], ['nestRefreshToken', 'Refresh token', 'password']] },
      smartthings: { emoji: '🏠', label: 'SmartThings device', discover: '/smartthings/discover',
                     fields: [['token', 'SmartThings token', 'password']] },
      manual:      { emoji: '⚙️', label: 'Something else (advanced)', manual: true },
    };
    // Plain-language jobs. A device can do more than one.
    const JOBS = [
      ['heat', '🔥 Heats the room'],
      ['cool', '❄️ Cools the room'],
      ['fan', '🌀 Freshens / moves air'],
      ['humidify', '💧 Adds humidity'],
      ['dehumidify', '🌵 Removes humidity'],
    ];

    let config;

    async function load() {
      const blocks = await homebridge.getPluginConfig();
      config = blocks.find(b => b.platform === 'Thermocombobulator')
        || (blocks.push({ platform: 'Thermocombobulator', name: 'Thermocombobulator', zones: [] }), blocks[blocks.length - 1]);
      config.zones = config.zones || [];
      render();
    }

    function thingsOf(zone) {
      const out = [];
      for (const [job] of JOBS) (zone.devices?.[job] || []).forEach(d => out.push({ job, name: d.name }));
      return out;
    }

    function render() {
      const root = document.getElementById('rooms');
      root.innerHTML = config.zones.length ? '' : '<p class="muted">No thermostats yet — add one below.</p>';
      config.zones.forEach((zone, zi) => root.appendChild(roomCard(zone, zi)));
    }

    function roomCard(zone, zi) {
      const el = document.createElement('div');
      el.className = 'room';
      const things = thingsOf(zone).map((t, ti) =>
        `<div class="thing"><span>${JOBS.find(j => j[0] === t.job)?.[1].split(' ')[0] || ''}</span> ${t.name}
           <button class="x" data-rm="${zi}:${t.job}:${t.name}">✕</button></div>`).join('');
      el.innerHTML = `
        <input class="room-name" value="${zone.name || ''}" placeholder="Thermostat name (e.g. Rear Bedroom)" data-z="${zi}">
        <div class="things">${things || '<span class="muted">Nothing added yet.</span>'}</div>
        <button class="big ghost" data-add="${zi}">＋ Add a device it controls</button>
        <div id="wiz-${zi}"></div>`;
      el.querySelector('.room-name').onchange = e => zone.name = e.target.value;
      el.querySelectorAll('[data-rm]').forEach(b => b.onclick = () => removeThing(b.dataset.rm));
      el.querySelector(`[data-add="${zi}"]`).onclick = () => pickService(zi);
      return el;
    }

    function removeThing(key) {
      const [zi, job, ...n] = key.split(':'); const name = n.join(':');
      const arr = config.zones[zi].devices?.[job];
      if (arr) config.zones[zi].devices[job] = arr.filter(d => d.name !== name);
      render();
    }

    function closeWizard(zi) { document.getElementById(`wiz-${zi}`).innerHTML = ''; }

    function pickService(zi) {
      const w = document.getElementById(`wiz-${zi}`);
      w.innerHTML = `<div class="step"><h4>What are you adding?</h4>${
        Object.entries(SERVICES).map(([k, s]) => `<button class="big" data-svc="${zi}:${k}">${s.emoji}  ${s.label}</button>`).join('')
      }<button class="big ghost" id="cancel-${zi}" style="margin-top:8px">Cancel</button></div>`;
      w.querySelectorAll('[data-svc]').forEach(b => b.onclick = () => {
        const [z, k] = b.dataset.svc.split(':'); serviceForm(+z, k);
      });
      document.getElementById(`cancel-${zi}`).onclick = () => closeWizard(zi);
    }

    function serviceForm(zi, key) {
      const s = SERVICES[key];
      const w = document.getElementById(`wiz-${zi}`);
      if (s.manual) {
        w.innerHTML = `<div class="step"><h4>⚙️ Add a device manually</h4>
          <input class="field" id="mn-${zi}" placeholder="Name (e.g. Space heater)">
          <input class="field" id="mon-${zi}" placeholder="Turn-ON web address (URL)">
          <input class="field" id="moff-${zi}" placeholder="Turn-OFF web address (URL)">
          ${jobChecks(zi, ['heat'])}
          <button class="big primary" id="madd-${zi}">Add</button>
          <button class="big ghost" id="mback-${zi}">← Back</button></div>`;
        document.getElementById(`madd-${zi}`).onclick = () => {
          const adapter = { type: 'http', onUrl: val(`mon-${zi}`), offUrl: val(`moff-${zi}`) };
          addToRoom(zi, val(`mn-${zi}`) || 'Device', adapter, checkedJobs(zi));
        };
        document.getElementById(`mback-${zi}`).onclick = () => pickService(zi);
        return;
      }
      w.innerHTML = `<div class="step"><h4>${s.emoji} ${s.direct ? `Find your ${s.label}s` : `Sign in to ${s.label}`}</h4>
        ${s.note ? `<p class="muted">${s.note}</p>` : ''}
        ${(s.fields || []).map(([k, ph, t]) => `<input class="field" id="f-${zi}-${k}" type="${t}" placeholder="${ph}">`).join('')}
        <button class="big primary" id="find-${zi}">${s.direct ? 'Find them' : 'Find my devices'}</button>
        <button class="big ghost" id="back-${zi}">← Back</button>
        <div id="res-${zi}"></div></div>`;
      document.getElementById(`find-${zi}`).onclick = () => findDevices(zi, key);
      document.getElementById(`back-${zi}`).onclick = () => pickService(zi);
    }

    async function findDevices(zi, key) {
      const s = SERVICES[key];
      const payload = {}; (s.fields || []).forEach(([k]) => payload[k] = val(`f-${zi}-${k}`));
      homebridge.showSpinner();
      try {
        const devices = await homebridge.request(s.discover, payload);
        window[`_d${zi}`] = devices;
        const res = document.getElementById(`res-${zi}`);
        if (!devices.length) return res.innerHTML = '<p class="muted">Hmm, no devices found on that account.</p>';
        res.innerHTML = `<p class="muted" style="margin-top:12px">Pick your device:</p>
          <div class="pick">${devices.map((d, i) => `<label><input type="radio" name="d${zi}" value="${i}" ${i ? '' : 'checked'}> <b>${d.name}</b> <span class="muted">${d.model || ''}</span></label>`).join('')}</div>
          ${jobChecks(zi, [devices[0].role || 'heat'])}
          <button class="big primary" id="pick-${zi}">Add to room</button>`;
        document.getElementById(`pick-${zi}`).onclick = () => {
          const idx = +document.querySelector(`input[name="d${zi}"]:checked`).value;
          const d = window[`_d${zi}`][idx];
          addToRoom(zi, d.name, d.config, checkedJobs(zi));
        };
      } catch (e) {
        homebridge.toast.error(e.message || 'Could not sign in', 'Try again');
      } finally { homebridge.hideSpinner(); }
    }

    function jobChecks(zi, preset) {
      return `<p class="muted" style="margin-top:12px">What does it do?</p><div class="checks">${
        JOBS.map(([k, label]) => `<label><input type="checkbox" class="j-${zi}" value="${k}" ${preset.includes(k) ? 'checked' : ''}> ${label}</label>`).join('')
      }</div>`;
    }
    const val = id => (document.getElementById(id)?.value || '').trim();
    const checkedJobs = zi => [...document.querySelectorAll(`.j-${zi}:checked`)].map(c => c.value);

    function addToRoom(zi, name, adapter, jobs) {
      if (!jobs.length) return homebridge.toast.error('Pick what it does');
      const zone = config.zones[zi];
      zone.devices = zone.devices || {};
      zone.sensors = zone.sensors || {};
      for (const job of jobs) { zone.devices[job] = zone.devices[job] || []; zone.devices[job].push({ name, adapter }); }
      // Thermostats/ACs quietly become the room's temperature + humidity source (no extra step for the user).
      if ((jobs.includes('heat') || jobs.includes('cool')) && !zone.sensors.temperature) {
        zone.sensors.temperature = { name, adapter: { ...adapter, sensorProperty: 'temperature' } };
        zone.sensors.humidity = { name, adapter: { ...adapter, sensorProperty: 'humidity' } };
      }
      document.getElementById(`wiz-${zi}`).innerHTML = '';
      homebridge.toast.success(`Added ${name}`, 'Nice');
      render();
    }

    document.getElementById('addRoom').onclick = () => {
      config.zones.push({ name: '', control: { defaultMode: 'auto', circulateFans: true }, sensors: {}, devices: {} });
      render();
    };
    document.getElementById('save').onclick = async () => {
      try {
        const blocks = await homebridge.getPluginConfig();
        const i = blocks.findIndex(b => b.platform === 'Thermocombobulator');
        i >= 0 ? blocks[i] = config : blocks.push(config);
        await homebridge.updatePluginConfig(blocks);
        await homebridge.savePluginConfig();
        // Verify it actually persisted (config-ui-x can silently strip against the schema).
        const after = await homebridge.getPluginConfig();
        const saved = (after.find(b => b.platform === 'Thermocombobulator')?.zones || []).length;
        if (saved !== config.zones.length) {
          homebridge.toast.error(`Only ${saved}/${config.zones.length} saved — some data was dropped.`, 'Partial save');
        } else {
          homebridge.toast.success(`Saved ${saved} thermostat(s). Restart Homebridge to apply.`, 'All set');
        }
      } catch (e) {
        homebridge.toast.error(e.message || String(e), 'Save failed');
      }
    };

    load();
  </script>
</body>
</html>
